name: Agent Review

on:
  pull_request:
    paths:
      - 'libs/core/**'
      - 'libs/loop/**'
      - 'libs/app/**'
      - 'libs/worldbuilding/**'
      - 'libs/tools/**'
      - 'libs/runtime/**'
      - 'webui/**'

jobs:
  agent-review:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - id: review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro
          ANTHROPIC_MODEL: deepseek-v4-pro
          ANTHROPIC_REASONING_MODEL: deepseek-v4-pro
          API_TIMEOUT_MS: "3000000"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        with:
          prompt: |
            You are a Senior Code Reviewer with expertise in C++, TypeScript,
            software architecture, and security best practices. Review this PR
            against its diff.

            ## What to Check

            **Correctness:**
            - Memory safety (use-after-free, double-delete, dangling references)
            - Concurrency safety (data races, lock ordering, mutex hygiene)
            - Exception safety (RAII, resource cleanup, no leaks on error paths)
            - Logic errors (bounds checks, null/invalid deref, signed/unsigned)

            **Architecture:**
            - Does the change follow existing project patterns?
            - Sound design decisions, clean separation of concerns?
            - For C++ DI patterns: PipelineManager::Dependencies, SubRunDeps
            - Integrates cleanly with surrounding code?

            **Security:**
            - Command injection (execvp, system, popen arguments)
            - SSRF, path traversal, unsafe file operations
            - XSS in webui code

            **Production readiness:**
            - Edge cases handled?
            - No hardcoded debug/test values?
            - Migration-safe (no breaking DB schema without migration)?

            ## Calibration

            Categorize by ACTUAL severity. Not everything is Critical.
            Acknowledge what was done well before listing issues — accurate
            praise helps the author trust the rest of the feedback.

            ## Output Format

            ### Strengths
            [What's well done? Be specific.]

            ### Issues

            #### Critical (Must Fix)
            [Bugs, security vulnerabilities, data loss risks, broken builds]

            #### Important (Should Fix)
            [Architecture problems, missing error handling, test gaps, unsafe patterns]

            #### Minor (Nice to Have)
            [Code style, optimization opportunities, doc polish]

            For each issue: file:line, what's wrong, why it matters, how to fix.

            ### Assessment

            **Verdict:** [Approve | Request Changes]
            **Reasoning:** [1-2 sentence technical assessment]

            ## Critical Rules

            DO: Be specific with file:line, explain WHY, acknowledge strengths,
            give a clear verdict.

            DON'T: Say "looks good" without checking, mark nitpicks as Critical,
            be vague, skip the verdict.

            Post your review as a PR review. Use Chinese for the review body.
          claude_args: "--max-turns 5"

      - name: Label ai-reviewed
        if: steps.review.outcome == 'success'
        run: gh pr edit --add-label "ai-reviewed"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Label needs-changes
        if: steps.review.outcome == 'failure'
        run: gh pr edit --add-label "needs-changes"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Block merge if needs changes
        if: steps.review.outcome == 'failure'
        run: |
          echo "Agent review found issues — merge blocked"
          exit 1
