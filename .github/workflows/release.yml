name: Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Conan
        run: |
          pip install "conan>=2.0,<3.0"
          conan profile detect

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.txt') }}
          restore-keys: ${{ runner.os }}-conan-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('webui/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Configure CMake
        run: |
          conan install . --build=missing -s build_type=Release
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build C++
        run: cmake --build build -j

      - name: Build WebUI
        run: |
          cd webui
          npm ci
          npm run build

      - name: Assemble green package
        run: |
          mkdir -p merak-pkg/webui merak-pkg/config
          cp build/cli/merak merak-pkg/
          cp -r webui/dist/* merak-pkg/webui/
          cp config/prompts merak-pkg/config/ -r 2>/dev/null || true
          cp scripts/start.sh merak-pkg/ 2>/dev/null || true

      - name: Package
        run: tar czf merak-linux-x64.tar.gz -C merak-pkg .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: merak-linux-x64
          path: merak-linux-x64.tar.gz

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Conan
        run: |
          pip install "conan>=2.0,<3.0"
          conan profile detect

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.txt') }}
          restore-keys: ${{ runner.os }}-conan-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('webui/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Configure CMake
        run: |
          conan install . --build=missing -s build_type=Release
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build C++
        run: cmake --build build --config Release -j

      - name: Build WebUI
        run: |
          cd webui
          npm ci
          npm run build

      - name: Assemble green package
        shell: bash
        run: |
          mkdir -p merak-pkg/webui merak-pkg/config
          cp build/cli/Release/merak.exe merak-pkg/ || cp build/cli/merak.exe merak-pkg/
          cp build/cli/Release/merak-launcher.exe merak-pkg/ 2>/dev/null || true
          cp -r webui/dist/* merak-pkg/webui/
          cp config/prompts merak-pkg/config/ -r 2>/dev/null || true

      - name: Package
        shell: bash
        run: |
          7z a merak-windows-x64.zip ./merak-pkg/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: merak-windows-x64
          path: merak-windows-x64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            merak-linux-x64/merak-linux-x64.tar.gz
            merak-windows-x64/merak-windows-x64.zip
          draft: true
          generate_release_notes: true
