version: "3.9"

services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-merak123}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7687:7687"   # Bolt protocol
      - "7474:7474"   # HTTP / Neo4j Browser
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1' | cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-merak123} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: merak
      POSTGRES_PASSWORD: ${PG_PASSWORD:-merak123}
      POSTGRES_DB: merak
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merak"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  pg_data:
